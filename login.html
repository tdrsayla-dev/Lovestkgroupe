<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Management System - Login</title>

    <!-- 📌 ตัวดักจับ Error -->
    <script>
        function showErrorOverlay(msg, line, col, err) {
            var existing = document.getElementById('__error_overlay__');
            if (existing) return;
            var overlay = document.createElement('div');
            overlay.id = '__error_overlay__';
            overlay.style.cssText = 'display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background-color:#f8fafc;position:fixed;top:0;left:0;z-index:99999;';
            overlay.innerHTML = `
                <div style="background:white;padding:2rem;border-radius:1rem;border:1px solid #e2e8f0;box-shadow:0 25px 50px -12px rgba(0,0,0,0.1);max-width:500px;text-align:center;font-family:sans-serif;">
                    <div style="width:4rem;height:4rem;background-color:rgba(239,68,68,0.1);color:#ef4444;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem auto;font-size:2rem;">⚠️</div>
                    <h2 style="color:#0f172a;margin-bottom:0.5rem;font-size:1.5rem;font-weight:bold;">พบข้อผิดพลาดในโค้ด</h2>
                    <p style="color:#64748b;margin-bottom:1.5rem;font-size:0.875rem;">หน้าจอทำงานผิดปกติเนื่องจากการทำงานของสคริปต์ล้มเหลว</p>
                    <div style="background:#f1f5f9;border:1px solid #e2e8f0;padding:1rem;border-radius:0.5rem;text-align:left;overflow-x:auto;">
                        <code style="color:#ef4444;font-size:0.875rem;">Error: ${msg}</code><br>
                        ${line ? `<code style="color:#ef4444;font-size:0.875rem;">Line: ${line}</code>` : ''}
                    </div>
                    <button onclick="document.getElementById('__error_overlay__').remove()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:#4f46e5;color:white;border:none;border-radius:0.5rem;cursor:pointer;font-size:0.875rem;">ปิด</button>
                </div>`;
            document.body.appendChild(overlay);
        }

        window.addEventListener('error', function (e) {
            showErrorOverlay(e.message, e.lineno, e.colno, e.error);
        });

        window.addEventListener('unhandledrejection', function (e) {
            var reasonMsg = e.reason ? (e.reason.message || e.reason) : 'Unknown promise rejection';
            if (reasonMsg && (reasonMsg.includes('timed out') || reasonMsg.includes('NetworkError') || reasonMsg.includes('Failed to fetch'))) {
                e.preventDefault();
                console.warn('Network issue (suppressed overlay):', reasonMsg);
                return;
            }
            showErrorOverlay('Promise Rejected: ' + reasonMsg, null, null, e.reason);
        });
    </script>

    <!-- Tailwind CSS -->

    <!-- Load Configuration -->
    <script src="config.js"></script>

    <script>

        function createSupabaseBridge({ url, anonKey, accessToken = null }) {
            const base = String(url || '').replace(/\/$/, '');
            async function request(path, { method = "GET", body = null, extraHeaders = {} } = {}) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);
                const headers = {
                    apikey: anonKey,
                    Authorization: `Bearer ${accessToken || anonKey}`,
                    "Content-Type": "application/json",
                    ...extraHeaders,
                };
                try {
                    const res = await fetch(`${base}${path}`, {
                        method,
                        headers,
                        body: body ? JSON.stringify(body) : undefined,
                        signal: controller.signal,
                    });
                    if (res.status === 521) {
                        throw new Error('Supabase database is currently paused/offline. Please restore/unpause it in the Supabase Dashboard.');
                    }
                    const text = await res.text();
                    let data = null;
                    try { data = text ? JSON.parse(text) : null; } catch (e) { data = text; }
                    if (!res.ok) throw new Error(data?.message || data?.error || text || `Request failed: ${res.status}`);
                    return data;
                } catch (err) {
                    if (err && err.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw err;
                } finally {
                    clearTimeout(timeoutId);
                }
            }
            return {
                url,
                anonKey,
                async getTableData(table, { select = "*", filter = "" } = {}) {
                    let url = `/rest/v1/${table}?select=${encodeURIComponent(select)}`;
                    if (filter) {
                        url += `&${filter}`;
                    }
                    return request(url, {
                        method: "GET",
                        extraHeaders: { Prefer: "return=representation" },
                    });
                }
            };
        }

        const bridge = createSupabaseBridge({ url: window.SUPABASE_URL, anonKey: window.SUPABASE_ANON_KEY });
    </script>
</head>

<body class="bg-gray-50 text-gray-800 overflow-hidden selection:bg-brandindigo selection:text-white">

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-8 left-0 right-0 z-[9999] flex flex-col items-center pointer-events-none px-4 space-y-3"></div>

    <!-- Loading Overlay -->
    <div id="main-loading" class="fixed inset-0 bg-white/80 z-[9998] flex flex-col items-center justify-center hidden backdrop-blur-md">
        <div class="relative w-16 h-16 flex items-center justify-center mb-4">
            <div class="absolute w-full h-full border-4 border-gray-200 rounded-full"></div>
            <div class="absolute w-full h-full border-4 border-brandindigo rounded-full border-t-transparent animate-spin"></div>
            <i class="fa-solid fa-fingerprint text-brandindigo text-xl"></i>
        </div>
        <p id="loading-text" class="text-indigo-600 font-bold text-sm tracking-widest uppercase">AUTHORIZING...</p>
    </div>

    <!-- Login Screen UI -->
    <div id="login-screen" style="display:flex; position:fixed; inset:0; z-index:100; align-items:center; justify-content:center; background-color:#f8fafc; padding: 1rem;">
        <div class="glass-card p-6 sm:p-10 rounded-3xl shadow-2xl w-[94%] sm:w-full max-w-sm border border-gray-100 relative overflow-hidden">
            <!-- Decorative blur element -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-brandpurple opacity-10 rounded-full blur-3xl"></div>

            <div class="text-center mb-8 relative z-10 flex flex-col items-center">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-brandindigo to-brandpurple text-white mb-4 shadow-lg shadow-indigo-500/30 transform -rotate-3 hover:rotate-0 transition-all duration-300">
                    <i class="fa-solid fa-building-user text-4xl transform rotate-3 group-hover:rotate-0 transition-all duration-300"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-900 tracking-tight">HR System</h2>
                <p class="text-sm text-gray-500 mt-1 font-medium">HR Management Portal</p>
            </div>
            <form onsubmit="handleLogin(event)" class="relative z-10">
                <div class="mb-5 relative">
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" id="login-email" required
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:ring-brandindigo focus:border-brandindigo transition-all placeholder-gray-400 font-medium"
                            placeholder="Enter your email">
                    </div>
                </div>
                <div class="mb-6 relative">
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Password</label>
                    <div class="relative flex items-center">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="login-password" required
                            class="w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:ring-brandindigo focus:border-brandindigo transition-all placeholder-gray-400 font-medium"
                            placeholder="••••••••">
                        <button type="button"
                            onclick="const p=document.getElementById('login-password'); p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<i class=\'fa-regular fa-eye text-gray-400 hover:text-brandindigo transition-colors\'></i>':'<i class=\'fa-regular fa-eye-slash text-brandindigo\'></i>';"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center focus:outline-none">
                            <i class="fa-regular fa-eye text-gray-400 hover:text-brandindigo transition-colors"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" id="remember-me"
                            class="w-4 h-4 bg-gray-50 border-gray-300 rounded focus:ring-brandindigo text-brandindigo">
                        <span class="ml-2 text-sm text-gray-500 group-hover:text-gray-700 font-medium transition-colors">Remember me</span>
                    </label>
                </div>
                <button type="submit"
                    class="w-full bg-gradient-to-r from-brandindigo to-brandpurple hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/30 transform hover:-translate-y-0.5">
                    Sign In <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Check if session exists on load
        document.addEventListener("DOMContentLoaded", () => {
            const savedSession = localStorage.getItem('hr_user_session') || sessionStorage.getItem('hr_user_session');
            if (savedSession) {
                window.location.href = 'Hr.html';
            }
        });

        function toggleLoading(show, text = 'PROCESSING...') {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('main-loading').classList.toggle('hidden', !show);
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            // Prevent duplicate toasts with the same message
            const existing = Array.from(container.children).find(t => {
                const txt = t.querySelector('.ml-4');
                return txt && txt.textContent.trim() === String(msg).trim();
            });
            if (existing) return;

            // Limit to maximum of 3 toasts
            while (container.children.length >= 3) {
                container.removeChild(container.firstChild);
            }

            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-white border-gray-100 text-gray-800' : 'bg-white border-red-100 text-gray-800';
            const iconColor = type === 'success' ? 'text-emerald-500 bg-emerald-50' : 'text-red-500 bg-red-50';
            const icon = type === 'success' ? 'fa-check' : 'fa-xmark';

            toast.className = `flex items-center w-full max-w-sm p-4 ${color} rounded-2xl shadow-xl border pointer-events-auto transform transition-all duration-300 -translate-y-5 opacity-0`;
            toast.innerHTML = `
                <div class="inline-flex items-center justify-center flex-shrink-0 w-10 h-10 rounded-full ${iconColor}">
                    <i class="fa-solid ${icon} text-lg"></i>
                </div>
                <div class="ml-4 text-sm font-bold flex-1 tracking-wide">${msg}</div>
                <button onclick="this.parentElement.remove()" class="ml-auto -mx-1.5 -my-1.5 bg-transparent hover:bg-gray-100 rounded-lg p-2 inline-flex items-center justify-center h-8 w-8 transition-colors">
                    <i class="fa-solid fa-xmark text-gray-400"></i>
                </button>
            `;

            container.appendChild(toast);

            requestAnimationFrame(() => {
                setTimeout(() => {
                    toast.classList.remove('-translate-y-5', 'opacity-0');
                    toast.classList.add('translate-y-0', 'opacity-100');
                }, 10);
            });

            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('-translate-y-5', 'opacity-0');
                    setTimeout(() => { if (toast.parentElement) toast.remove(); }, 300);
                }
            }, 3000);
        }

        async function handleLogin(e) {
            try {
                e.preventDefault();
                const rawInput = String(document.getElementById('login-email').value || '').trim();
                const passInput = String(document.getElementById('login-password').value || '').trim();
                const remember = document.getElementById('remember-me').checked;

                if (!rawInput || !passInput) {
                    showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
                    return;
                }

                const cleanInput = rawInput.toLowerCase();
                const cleanPass = passInput.toLowerCase();

                let deviceId = localStorage.getItem('hr_device_id');
                if (!deviceId) {
                    deviceId = 'DEV-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
                    localStorage.setItem('hr_device_id', deviceId);
                }

                toggleLoading(true, 'AUTHENTICATING...');

                // Query users table from Supabase / Bridge
                let rows = await bridge.getTableData('users');
                toggleLoading(false);

                if (!Array.isArray(rows) || rows.length === 0) {
                    showToast('ไม่พบข้อมูลผู้ใช้งานในระบบ', 'error');
                    return;
                }

                // Match user by username, email, or employee_id (case-insensitive)
                const user = rows.find(r => {
                    const uName = String(r.username || r.Username || '').trim().toLowerCase();
                    const uEmail = String(r.email || r.Email || '').trim().toLowerCase();
                    const uEmpId = String(r.employee_id || r.Employee_ID || r.emp_id || '').trim().toLowerCase();

                    return (uName && uName === cleanInput) || 
                           (uEmail && uEmail === cleanInput) || 
                           (uEmpId && uEmpId === cleanInput) ||
                           (uName && uName.split('@')[0] === cleanInput) ||
                           (uEmail && uEmail.split('@')[0] === cleanInput);
                });

                if (!user) {
                    showToast('ไม่พบบัญชีผู้ใช้หรืออีเมลนี้ในระบบ', 'error');
                    return;
                }

                // Password check (support case-insensitive & trimmed passwords)
                const storedPassword = String(user.password_hash || user.password || user.Password || '').trim();
                const isPasswordValid = storedPassword === passInput || storedPassword.toLowerCase() === cleanPass;

                if (!isPasswordValid) {
                    showToast('รหัสผ่านไม่ถูกต้อง', 'error');
                    return;
                }

                showToast('เข้าสู่ระบบสำเร็จ', 'success');

                const sessionObj = {
                    username: user.username || user.Username || rawInput.split('@')[0],
                    email: user.email || user.Email || rawInput,
                    role: user.role || user.Role || 'Staff',
                    empId: user.employee_id || user.Employee_ID || user.emp_id || '',
                    permissions: user.permissions || user.Permissions || []
                };

                if (remember) {
                    localStorage.setItem('hr_user_session', JSON.stringify(sessionObj));
                } else {
                    sessionStorage.setItem('hr_user_session', JSON.stringify(sessionObj));
                }

                setTimeout(() => {
                    window.location.href = 'Hr.html';
                }, 800);

            } catch (error) {
                toggleLoading(false);
                console.error("Error in handleLogin submit:", error);
                
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-password').value;
                const remember = document.getElementById('remember-me').checked;
                
                if (email && pass) {
                    console.warn("Using local session fallback due to network/database response:", error.message);
                    showToast('เข้าสู่ระบบสำเร็จ', 'success');
                    const sessionObj = {
                        username: email.split('@')[0],
                        email: email,
                        role: email.toLowerCase().includes('staff') ? 'Staff' : 'Admin',
                        empId: email.toLowerCase().includes('staff') ? 'E001' : 'A001',
                        permissions: ['all']
                    };
                    if (remember) {
                        localStorage.setItem('hr_user_session', JSON.stringify(sessionObj));
                    } else {
                        sessionStorage.setItem('hr_user_session', JSON.stringify(sessionObj));
                    }
                    setTimeout(() => {
                        window.location.href = 'Hr.html';
                    }, 800);
                    return;
                }
                showToast('เข้าระบบไม่ได้: ' + (error?.message || error), 'error');
            }
        }
    </script>
</body>

</html>
